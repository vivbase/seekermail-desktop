# macOS release pipeline (T056, dev/05 §1.3 six steps + §3).
#
# Trigger: pushing a `v*` tag (e.g. v0.4.0-beta). Two matrix legs build, sign
# (inside-out, --timestamp, hardened runtime), notarize (notarytool --wait),
# staple, Gatekeeper-verify, then a final job assembles `latest.json` and
# publishes the GitHub Release. Secret names follow dev/05 §1.1 exactly —
# nothing certificate- or key-shaped is ever hardcoded here.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # gh release create

env:
  CARGO_TERM_COLOR: always

jobs:
  supply-chain-gate:
    name: Supply-chain gate (cargo deny + pnpm audit)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack (pinned pnpm)
        run: corepack enable
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Setup Rust stable
        run: rustup show active-toolchain || rustup toolchain install stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny check (licenses + advisories)
        working-directory: src-tauri
        run: cargo deny check
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: pnpm audit (Critical blocks release)
        run: pnpm audit --audit-level critical

  build-sign-notarize:
    name: Build · Sign · Notarize (${{ matrix.target }})
    needs: supply-chain-gate
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: [self-hosted, macos, apple-silicon]
          - target: x86_64-apple-darwin
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90 # notarization alone budgets 2–15 min (dev/05 §1.4)
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pinned pnpm)
        run: corepack enable
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Setup Rust stable + target
        run: |
          rustup show active-toolchain || rustup toolchain install stable
          rustup target add ${{ matrix.target }}
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── Step 1/6: import the Developer ID certificate ─────────────────────
      - name: Import signing certificate into a throwaway keychain
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          KEYCHAIN=release.keychain-db
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$MAC_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 7200 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$MAC_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f cert.p12
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F '"' '/Developer ID Application/ {print $2; exit}')
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      # ── Step 2/6: build (Tauri signs the bundle + updater artifacts) ──────
      - name: Build the app bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.SIGN_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      # ── Step 3/6: inside-out re-sign of native libs (dev/05 §1.4 pitfall:
      #     ONNX Runtime / LanceDB dylibs must be signed BEFORE the .app) ─────
      - name: Inside-out codesign (dylibs → .app)
        run: |
          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/SeekerMail.app"
          find "$APP" \( -name '*.dylib' -o -name '*.so' -o -name '*.framework' \) -print0 \
            | while IFS= read -r -d '' lib; do
                codesign --force --timestamp --options runtime \
                  --sign "$SIGN_IDENTITY" "$lib"
                codesign -vvv --verify "$lib"
              done
          codesign --force --timestamp --options runtime \
            --entitlements src-tauri/entitlements.plist \
            --sign "$SIGN_IDENTITY" "$APP"
          codesign -vvv --verify --deep "$APP"

      # ── Step 4/6: DMG ──────────────────────────────────────────────────────
      - name: Build and sign the DMG
        run: |
          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/SeekerMail.app"
          TAG="${GITHUB_REF_NAME}"
          DMG="SeekerMail-${TAG}-$(date +%Y%m%d)-${{ matrix.target }}.dmg"
          hdiutil create -volname "SeekerMail" -srcfolder "$APP" -ov -format UDZO "$DMG"
          codesign --force --timestamp --sign "$SIGN_IDENTITY" "$DMG"
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"

      # ── Step 5/6: notarize + staple ───────────────────────────────────────
      - name: Notarize (notarytool --wait) and staple
        env:
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          NOTARY_API_ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
          NOTARY_API_KEY_P8: ${{ secrets.NOTARY_API_KEY_P8 }}
        run: |
          echo "$NOTARY_API_KEY_P8" > notary-key.p8
          xcrun notarytool submit "$DMG_PATH" \
            --key notary-key.p8 \
            --key-id "$NOTARY_API_KEY_ID" \
            --issuer "$NOTARY_API_ISSUER_ID" \
            --wait --timeout 30m
          rm -f notary-key.p8
          xcrun stapler staple "$DMG_PATH"

      # ── Step 6/6: Gatekeeper verification ─────────────────────────────────
      - name: Gatekeeper assessment
        run: |
          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/SeekerMail.app"
          spctl --assess --type execute -vv "$APP"

      - name: Collect updater artifacts
        run: |
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          mkdir -p dist-${{ matrix.target }}
          cp "$DMG_PATH" dist-${{ matrix.target }}/
          cp "$BUNDLE"/SeekerMail.app.tar.gz dist-${{ matrix.target }}/SeekerMail-${{ matrix.target }}.app.tar.gz
          cp "$BUNDLE"/SeekerMail.app.tar.gz.sig dist-${{ matrix.target }}/SeekerMail-${{ matrix.target }}.app.tar.gz.sig

      - name: Upload leg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist-${{ matrix.target }}/

  # ── Windows leg (T115, dev/05 §5) — MSVC build, NSIS + MSI, Authenticode ─────
  build-windows:
    name: Build · Sign (windows-x86_64)
    needs: supply-chain-gate
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack (pinned pnpm)
        run: corepack enable
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Setup Rust stable + MSVC target
        run: |
          rustup show active-toolchain || rustup toolchain install stable
          rustup target add x86_64-pc-windows-msvc
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      # Tauri signs the updater artifacts (.nsis.zip + .sig) with the same key as
      # the macOS leg; Authenticode signing of the installer is a separate step.
      - name: Build (NSIS + MSI + signed updater artifacts)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target x86_64-pc-windows-msvc
      - name: Authenticode sign + verify the installer
        shell: bash
        env:
          WIN_CERT_THUMBPRINT: ${{ secrets.WIN_CERT_THUMBPRINT }}
          WIN_SIGNING_URL: ${{ secrets.WIN_SIGNING_URL }}
          WIN_SIGNING_TOKEN: ${{ secrets.WIN_SIGNING_TOKEN }}
        run: |
          BUNDLE="src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          bash scripts/sign_windows.sh "$BUNDLE"/nsis/*-setup.exe
          bash scripts/verify_windows_sig.sh "$BUNDLE"/nsis/*-setup.exe
      - name: Collect Windows artifacts
        shell: bash
        run: |
          BUNDLE="src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          mkdir -p dist-windows-x86_64
          cp "$BUNDLE"/nsis/*-setup.exe        dist-windows-x86_64/ 2>/dev/null || true
          cp "$BUNDLE"/nsis/*-setup.nsis.zip   dist-windows-x86_64/ 2>/dev/null || true
          cp "$BUNDLE"/nsis/*-setup.nsis.zip.sig dist-windows-x86_64/ 2>/dev/null || true
          cp "$BUNDLE"/msi/*.msi               dist-windows-x86_64/ 2>/dev/null || true
      - name: Upload Windows leg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-x86_64
          path: dist-windows-x86_64/

  publish:
    name: Assemble latest.json + GitHub Release
    # Windows leg blocks publish so latest.json carries every platform (dev/05 §5).
    needs: [build-sign-notarize, build-windows]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Generate latest.json (dev/05 §2 format)
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SIG_AARCH64=$(cat dist/dist-aarch64-apple-darwin/*.app.tar.gz.sig)
          SIG_X86=$(cat dist/dist-x86_64-apple-darwin/*.app.tar.gz.sig)
          SIG_WIN=$(cat dist/dist-windows-x86_64/*.nsis.zip.sig 2>/dev/null || echo "")
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG_AARCH64}",
                "url": "${BASE}/SeekerMail-aarch64-apple-darwin.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${SIG_X86}",
                "url": "${BASE}/SeekerMail-x86_64-apple-darwin.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${SIG_WIN}",
                "url": "${BASE}/SeekerMail-x64-setup.nsis.zip"
              }
            }
          }
          EOF
          cat latest.json
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Pre-1.0 milestones (suffixed tags like v*-beta / v*-rc) publish as GitHub
          # pre-releases — visible for preview but never marked "Latest". Only a final
          # GA tag with no suffix (e.g. v1.0.0) becomes the public Latest release.
          # See dev/05 §3.1 and planning/00 §8.
          case "${GITHUB_REF_NAME}" in
            *-*) PRERELEASE_FLAG=--prerelease ;;
            *)   PRERELEASE_FLAG= ;;
          esac
          gh release create "${GITHUB_REF_NAME}" \
            --title "SeekerMail ${GITHUB_REF_NAME}" \
            --generate-notes ${PRERELEASE_FLAG} \
            dist/dist-*/* latest.json
