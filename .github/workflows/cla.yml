name: cla

# Records contributor agreement to CLA.md on each pull request, enabling the
# project's dual-licensing model. Contributors accept by commenting the sign
# sentence below on their PR.
#
# ONE-TIME SETUP: create a repository secret named CLA_SIGNATURES_TOKEN holding a
# fine-grained Personal Access Token with "Contents: read & write" on this repo.
# The bot uses it to store signatures on the `cla-signatures` branch. No secret
# is needed for your own PRs (the owner is allow-listed below).

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-document: "https://github.com/vivbase/seekermail-desktop/blob/main/CLA.md"
          path-to-signatures: "signatures/cla.json"
          branch: "cla-signatures"
          allowlist: "vivbase,dependabot[bot]"
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA."
