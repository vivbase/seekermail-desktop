name: license-check

on:
  pull_request:
  push:
    branches: [main]

# Blocks any GPL/AGPL/LGPL/SSPL (or otherwise non-allowlisted) dependency from
# entering the tree, which would silently force the whole app copyleft.
jobs:
  cargo-deny:
    name: cargo-deny (${{ matrix.manifest }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manifest: [src-tauri, cloud, xtask]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check licenses, bans, and sources
        run: cargo deny --manifest-path ${{ matrix.manifest }}/Cargo.toml check licenses bans sources

  npm-licenses:
    name: npm license gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/ci/check-licenses.mjs
