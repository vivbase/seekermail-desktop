# cargo-deny configuration (T056, dev/05 §4 supply-chain gate).
#
# Licenses: permissive allow-list only — copyleft (GPL/AGPL/LGPL) is rejected
# because SeekerMail ships as a commercial binary. Advisories: any Critical
# vulnerability blocks the release workflow.

[graph]
all-features = false

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
]
confidence-threshold = 0.9

[advisories]
version = 2
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
